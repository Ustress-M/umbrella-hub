# /etc/nginx/sites-available/umbrella.conf
# 실제 서비스 도메인: umbrella.ms-project.kr

server {
    listen 80;
    server_name umbrella.ms-project.kr www.umbrella.ms-project.kr;

    # Certbot HTTP-01 챌린지 경로 (webroot 플러그인 사용 시)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 HTTP 요청은 HTTPS 로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name umbrella.ms-project.kr www.umbrella.ms-project.kr;

    # Let's Encrypt 인증서 (certbot --nginx 로 발급됨)
    ssl_certificate     /etc/letsencrypt/live/umbrella.ms-project.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/umbrella.ms-project.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    # 반납 사진 업로드 한도
    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Next.js 컨테이너(포트 3000) 프록시
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
