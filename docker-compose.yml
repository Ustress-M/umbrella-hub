services:
  app:
    image: ${APP_IMAGE:-ghcr.io/ustress-m/umbrella-hub}:latest
    container_name: umbrella-hub
    restart: unless-stopped
    ports:
      # nginx 역방향 프록시만 접근하도록 localhost 에만 바인딩.
      # 여러 서브도메인 프로젝트를 같은 VPS 에서 운영할 때 포트 직통 접근을
      # 차단해 공격 표면을 줄인다. 외부 노출은 전적으로 nginx 가 담당.
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      # bcrypt 해시에는 `$` 가 섞여있어 env_file 파서나 쉘에서 손상되기 쉬움.
      # 대신 Compose 자동 로드 파일 (docker-compose.yml 과 같은 폴더의 .env)
      # 에 ADMIN_PASSWORD_HASH 를 둬서 그 값이 그대로 컨테이너에 주입되게 한다.
      # Compose 는 .env 값을 해석 없이 리터럴로 넘긴다.
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH must be set in /opt/umbrella-hub/.env}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
