# /etc/nginx/sites-available/umbrella.conf
# 실제 서비스 도메인: umbrella.project-ms.kr
# (구 도메인 umbrella.ms-project.kr 은 이관 기간 동안 함께 응답, 추후 제거 가능)

server {
    listen 80;
    server_name umbrella.project-ms.kr umbrella.ms-project.kr www.umbrella.ms-project.kr;

    # Certbot HTTP-01 챌린지 경로 (webroot 플러그인 사용 시)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 HTTP 요청은 HTTPS 로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # nginx 1.24 (Ubuntu 22.04) 는 `http2 on;` 별도 디렉티브를 지원하지 않음.
    # `listen 443 ssl http2;` 한 줄 문법 사용.
    listen 443 ssl http2;
    server_name umbrella.project-ms.kr;

    # Let's Encrypt 인증서 (certbot --nginx -d umbrella.project-ms.kr 로 발급)
    ssl_certificate     /etc/letsencrypt/live/umbrella.project-ms.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/umbrella.project-ms.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# (선택) 구 도메인 umbrella.ms-project.kr 을 새 도메인으로 영구 리다이렉트.
# certbot 이 옛 인증서를 자동 갱신하고 있다면 유지해도 됨.
server {
    listen 443 ssl http2;
    server_name umbrella.ms-project.kr www.umbrella.ms-project.kr;

    ssl_certificate     /etc/letsencrypt/live/umbrella.ms-project.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/umbrella.ms-project.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://umbrella.project-ms.kr$request_uri;
}
