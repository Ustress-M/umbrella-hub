name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. 코드 품질 검사 (PR + Push 모두 실행)
  # ────────────────────────────────────────────────────────────
  lint:
    name: 린트 & 타입 체크
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Prisma 클라이언트 생성
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: TypeScript 타입 체크
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # ────────────────────────────────────────────────────────────
  # 2. DB 마이그레이션 (GitHub Actions 러너에서 실행 — main Push 시에만)
  #
  # 왜 VPS 가 아닌 러너에서 실행하나:
  #  - Neon direct endpoint(5432) 는 컴퓨트 scale-to-zero 에서 깨어나는 데
  #    수초가 걸리고, 기본 Docker bridge 네트워크는 IPv6 AAAA 응답을 만나면
  #    Prisma 엔진이 IPv4 폴백 전에 타임아웃 → P1001 을 반복 유발함.
  #  - GitHub 러너는 깨끗한 듀얼스택·AWS 백본 근접성·재시도 로그가 표준이라
  #    Neon 공식 권장 CI 마이그레이션 경로에 부합함.
  #  - 러너는 레포 main SHA 를 체크아웃하므로, 같은 커밋에서 빌드되는 이미지와
  #    스키마가 항상 일치함.
  # ────────────────────────────────────────────────────────────
  migrate:
    name: DB 마이그레이션 (Neon)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Prisma migrate deploy (Neon 컴퓨트 웨이크업 재시도 포함)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          set +e
          for attempt in 1 2 3 4 5; do
            echo "::group::migrate attempt ${attempt}/5"
            npx prisma migrate deploy
            code=$?
            echo "::endgroup::"
            if [ $code -eq 0 ]; then
              echo "✅ Prisma 마이그레이션 성공 (attempt ${attempt})"
              exit 0
            fi
            wait=$((attempt * 6))
            echo "⏳ Neon 컴퓨트 재개 대기 ${wait}초 후 재시도..."
            sleep $wait
          done
          echo "❌ Prisma 마이그레이션 5회 모두 실패"
          exit 1

  # ────────────────────────────────────────────────────────────
  # 3. Docker 빌드 & 배포 (main 브랜치 Push 시에만)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: 빌드 & 배포
    runs-on: ubuntu-latest
    needs: [lint, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: 이미지 이름 소문자 변환
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: GHCR 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: VPS 배포
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,ACTOR,TOKEN
          script: |
            set -e
            cd /opt/umbrella-hub

            # 1) 최신 이미지 pull
            echo "${TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin
            docker pull "${IMAGE}:latest"

            # 2) 앱 재시작 (DB 마이그레이션은 이전 job 에서 이미 적용됨)
            APP_IMAGE="${IMAGE}" docker compose up -d --no-deps app

            # 3) 오래된 이미지 정리
            docker image prune -f

            echo "✅ 배포 완료: $(date)"
