# /etc/nginx/sites-available/<PROJECT>.conf 템플릿
# ──────────────────────────────────────────────────────────────
# 사용법:
#   1) <PROJECT>  → 소문자 영숫자 (예: gpt, chat, board)
#   2) <SUBDOMAIN> → 공개할 서브도메인 (예: gpt.project-ms.kr)
#   3) <APP_PORT> → 컨테이너/앱이 바인딩한 호스트 포트 (예: 3001)
#      기존 프로젝트와 겹치지 않게 할당. 현재 할당 현황:
#        3000 — umbrella-hub
#        3001 — (미사용 / 다음 프로젝트용)
#        3002 — (미사용)
#
#   4) sed 로 한 번에 치환 후 /etc/nginx/sites-available/ 에 배치:
#      sed -e 's/<PROJECT>/gpt/g' \
#          -e 's/<SUBDOMAIN>/gpt.project-ms.kr/g' \
#          -e 's/<APP_PORT>/3001/g' \
#          nginx/_subdomain.template.conf \
#        | sudo tee /etc/nginx/sites-available/gpt.conf
#      sudo ln -sf /etc/nginx/sites-available/gpt.conf /etc/nginx/sites-enabled/gpt.conf
#      sudo certbot --nginx -d gpt.project-ms.kr
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name <SUBDOMAIN>;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # nginx 1.24 호환: `http2 on;` 대신 `listen ... http2;` 한 줄 문법 사용.
    listen 443 ssl http2;
    server_name <SUBDOMAIN>;

    ssl_certificate     /etc/letsencrypt/live/<SUBDOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<SUBDOMAIN>/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    location / {
        proxy_pass http://127.0.0.1:<APP_PORT>;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
