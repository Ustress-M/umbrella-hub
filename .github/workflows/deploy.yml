name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. 코드 품질 검사 (PR + Push 모두 실행)
  # ────────────────────────────────────────────────────────────
  lint:
    name: 린트 & 타입 체크
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Prisma 클라이언트 생성
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: TypeScript 타입 체크
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # ────────────────────────────────────────────────────────────
  # 2. Docker 빌드 & 배포 (main 브랜치 Push 시에만)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: 빌드 & 배포
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: 이미지 이름 소문자 변환
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: GHCR 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: VPS 배포
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,ACTOR,TOKEN
          script: |
            set -e
            cd /opt/umbrella-hub

            # 1) 최신 이미지 pull
            echo "${TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin
            docker pull "${IMAGE}:latest"

            # 2) DB 마이그레이션 (앱 재시작 전에 실행 — Prisma v7 권장 방식)
            #
            #    - .bin/prisma 심볼릭 링크 대신 번들 파일 직접 실행
            #      (Docker COPY 가 심볼릭 링크를 풀어 WASM 상대경로가 깨짐)
            #    - --env-file 대신 .env.production 을 /app/.env 로 마운트
            #      (Docker --env-file 은 값의 따옴표를 리터럴로 남겨 URL 스킴 파싱 실패.
            #       prisma.config.ts 의 dotenv 로 로드해 따옴표를 정상 제거)
            docker run --rm \
              -v "$(pwd)/.env.production:/app/.env:ro" \
              --user root \
              "${IMAGE}:latest" \
              node node_modules/prisma/build/index.js migrate deploy

            # 3) 앱 재시작 (무중단)
            APP_IMAGE="${IMAGE}" docker compose up -d --no-deps app

            # 4) 오래된 이미지 정리
            docker image prune -f

            echo "✅ 배포 완료: $(date)"
